services:
  - type: web
    name: resume-analyzer
    runtime: python-3.11
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 4 -b 0.0.0.0:10000 'src.app:app'"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
    disk:
      name: uploads
      mountPath: /var/data/uploads
      sizeGB: 1
